{% extends "base.html" %}

{% block content %}

<h1>Viewing Custom RBFB: {{ topic }}</h1>
<table>
    {% for c in candidates %}
    <tr>
        <td> {{ c[0] }} </td>
        <td> <button type="submit" name="real">Real</button> </td>
        <td> <button type="submit" name="fake">Fake</button> </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
