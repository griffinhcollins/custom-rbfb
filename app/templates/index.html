{% extends "base.html" %}

{% block content %}

<h1>Welcome to RBFB Custom</h1>
<table id="index-table">
<th>Topic</th>
<th>Author</th>
<th>Date Created</th>
    {% for post in posts|reverse %}
    <tr>
        <td>
            <a href="/view/{{ post.urlval }}">{{ post.topic }}</a>
        </td>
        <td>
            <div>{{ post.author }}</a>
        </td>
        <td>
            <div>{{ post.date }}</a>
        </td>
    </tr>
    {% endfor %}
</table>


{% endblock %}
