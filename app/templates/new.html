{% extends "base.html" %}

{% block content %}

<h1>Creating Custom RBFB</h1>
<form action="" method="post" novalidate>
    {{ form.hidden_tag() }}
    <table>
        {% for q in form.questions %}
        <tr>
            <td> {{ q.entry.label }} {{loop.index}}: </td>
            <td> {{ q.entry() }} </td>
            <td> {{ q.real }} </td>
        </tr>
        {% endfor %}
    </table>
</form>

{% endblock %}
